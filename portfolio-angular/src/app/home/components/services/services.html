<section class="services" id="service">
  <div class="container d-flex flex-column justify-content-between h-100">

    <div class="section-title flex-grow-1">
      <div class="row">
        <div class="col-lg-12">
          <div class="text-center">
            <h2 data-aos="heading-show" class="text_background">
              Ce que je fais
              <span class="heading_background">Services</span>
            </h2>
            <p class="m-0">Une approche polyvalente entre Développement et Infrastructure</p>
          </div>
        </div>
      </div>
    </div>

    <div class="section-content flex-grow-1">
      <div class="row">

        <ng-container *ngIf="services.length; else servicesLoader">
          <div class="col-lg-4 col-md-6 mt-4 mb-2"
               *ngFor="let service of services"
               data-aos="fade-up">
            <div class="service-single text-left p-5">
              <div class="service-icon">
                <span [class]="service.icone || 'mbri-code'"></span>
              </div>
              <h3 class="my-3">{{ service.nom }}</h3>
              <p>{{ service.detail }}</p>
              <div class="service-tools mt-2" *ngIf="service.outils">
                <small class="text-muted">
                  <i class="fas fa-tools mr-1"></i> {{ service.outils }}
                </small>
              </div>
            </div>
          </div>
        </ng-container>

        <ng-template #servicesLoader>
          <div class="col-lg-4 col-md-6 mt-4 mb-2" *ngFor="let i of [1,2,3,4,5,6]">
            <div class="service-single p-5">
              <div class="skeleton-circle mb-3"></div>
              <div class="skeleton-line w-60 mb-3"></div>
              <div class="skeleton-line w-100 mb-2"></div>
              <div class="skeleton-line w-80"></div>
            </div>
          </div>
        </ng-template>

      </div>
    </div>

  </div>
</section>
