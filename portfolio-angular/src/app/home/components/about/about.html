<section class="about" id="about">
  <div class="container d-flex justify-content-between flex-column h-100">
    
    <div class="section-title flex-grow-1">
      <div class="row">
        <div class="col-lg-12">
          <div class="text-center">
            <h2 class="text_background">
              Qui suis-je ?
              <span class="heading_background">A Propos</span>
            </h2>
            <p class="m-0">Développeur & Technicien Réseaux Passionné</p>
          </div>
        </div>
      </div>
    </div>

    <div class="section-content flex-grow-1" *ngIf="profile">
      <div class="row align-items-center justify-content-center">
        
        <div class="col-lg-10 text-center">
          <h3 class="mb-4">Passionné par la Cybersécurité et le Développement</h3>
          
          <p class="description-text">
            {{ profile.description }}
          </p>

          <div class="mt-5">
            <a *ngIf="profile.lien_cv" [href]="getCvUrl()" download class="cta-primary">
              Télécharger mon CV
            </a>
          </div>
        </div>

      </div>
    </div>

  </div>
</section>
