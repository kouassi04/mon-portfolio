<section class="home d-flex" id="home">

  <div class="hero-bg">
    <div class="hero-grain"></div>
    <div class="hero-glow"></div>
  </div>

  <div class="deco-lines">
    <span class="deco-line line-1"></span>
    <span class="deco-line line-2"></span>
    <span class="deco-line line-3"></span>
  </div>

  <div class="hero-photo-wrap">
    <div class="hero-photo-frame">
      <img
        [src]="getPhotoUrl()"
        class="hero-photo"
        [alt]="profile ? profile.prenom : 'Chargement...'"
        *ngIf="profile; else photoSkeleton"
      >
      <ng-template #photoSkeleton>
        <div class="hero-photo skeleton-box" style="background: rgba(255,255,255,0.05); width: 100%; height: 100%;"></div>
      </ng-template>

      <div class="hero-badge">
        <span class="badge-dot"></span>
        <span class="badge-text">Disponible</span>
      </div>
    </div>
    <div class="photo-accent"></div>
  </div>

  <div class="hero-content">

    <div class="hero-label">
      <span class="label-line"></span>
      <span class="label-text">Portfolio 2025</span>
    </div>

    <div class="hero-role">
      <span class="role-prefix">Je suis</span>
      <span class="hero-type" *ngIf="!profile">Développeur Full Stack</span>
      <span class="welcome-text-type hero-type" *ngIf="profile"
            data-options="Développeur Full Stack, Passionné Réseaux, Passionné cybersécurité">
      </span>
    </div>

    <div class="hero-name">
      <ng-container *ngIf="profile; else nameLoader">
        <div class="name-line name-line-1">
          <span class="name-char" *ngFor="let c of profile.nom.split(''); let i = index"
            [style.animation-delay]="(i * 0.05) + 's'">{{ c === ' ' ? '\u00A0' : c }}</span>
        </div>
        <div class="name-line name-line-2">
          <span class="name-char" *ngFor="let c of profile.prenom.split(''); let i = index"
            [style.animation-delay]="(0.3 + i * 0.05) + 's'">{{ c === ' ' ? '\u00A0' : c }}</span>
        </div>
      </ng-container>

      <ng-template #nameLoader>
        <div class="name-skeleton" style="height: 60px; background: rgba(255,255,255,0.1); width: 300px; border-radius: 4px; margin-bottom: 10px;"></div>
        <div class="name-skeleton" style="height: 60px; background: rgba(255,255,255,0.1); width: 200px; border-radius: 4px;"></div>
      </ng-template>
    </div>

    <div class="hero-actions">
      <a href="#about" class="cta-primary">
        <span class="cta-text">En savoir plus</span>
        <span class="cta-arrow">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </span>
        <span class="cta-bg"></span>
      </a>

      <div class="hero-socials" *ngIf="profile && profile.socials && profile.socials.length > 0">
        <a *ngFor="let s of profile.socials" [href]="s.lien" target="_blank" class="social-dot" [title]="s.nom_plateforme">
          <i [class]="s.icone"></i>
        </a>
      </div>
    </div>
  </div>

  <div class="scroll-down">
    <a href="#about" class="scroll-down-link text-center hoveroff">
      <div class="scroll-title">Scroll</div>
      <div class="scroll-mouse">
        <div class="whell"></div>
      </div>
    </a>
  </div>

  <div class="floating-stats" *ngIf="profile && profile.stats && profile.stats.length > 0">
    <div class="fstat" *ngFor="let s of profile.stats.slice(0, 2)">
      <span class="fstat-val">{{ s.valeur }}+</span>
      <span class="fstat-label">{{ s.label }}</span>
    </div>
  </div>

</section>
