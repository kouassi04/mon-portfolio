<section class="blog" id="blog">
  <div class="container d-flex flex-column justify-content-between h-100">
    <div class="section-title flex-grow-1">
      <div class="row">
        <div class="col-lg-12">
          <div class="text-center">
            <h2 data-aos="heading-show" class="text_background">
              Mes Articles
              <span class="heading_background">Blog</span>
            </h2>
            <p class="m-0">Partage de connaissances et veille technologique</p>
          </div>
        </div>
      </div>
    </div>

    <div class="section-content flex-grow-1">
      <div class="row">

        <ng-container *ngIf="articles.length; else blogLoader">
          <div class="col-lg-4 col-md-12" *ngFor="let article of articles" data-aos="fade-up">
            <div class="news-item mb-5 mb-lg-0">
              <div class="news-cover">
                <img
                  [src]="getImageUrl(article)"
                  [alt]="article.titre"
                  class="img-fluid"
                  style="object-fit: cover; height: 220px; width: 100%;"
                >
              </div>
              <div class="news-content p-4">
                <div class="news-title mb-3">
                  <a href="javascript:void(0)" (click)="openArticle($event, article)" class="blog-permalink">
                    <h3>{{ article.titre }}</h3>
                  </a>
                </div>
                <div class="news-meta d-flex flex-row mb-4">
                  <div class="news-meta-single mr-3">
                    <span class="mbri-calendar"></span>
                    <span class="meta-value">{{ formatDate(article.created_at) }}</span>
                  </div>
                  <div class="news-meta-single" *ngIf="article.categorie">
                    <span class="mbri-tag"></span>
                    <span class="meta-value">{{ article.categorie }}</span>
                  </div>
                </div>
                <p>{{ article.resume }}</p>
                <div class="readMore">
                  <button (click)="openArticle($event, article)" class="btn btn-outline-primary">
                    Lire la suite
                  </button>
                </div>
              </div>
            </div>
          </div>
        </ng-container>

        <ng-template #blogLoader>
          <div class="col-12 text-center py-5">
            <p class="text-muted">
              <i class="fas fa-pen-nib fa-2x mb-3 d-block"></i>
              Aucun article pour le moment.
            </p>
          </div>
        </ng-template>

      </div>
    </div>
  </div>
</section>
